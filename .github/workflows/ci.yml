name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Test, typecheck and build
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin SDK
        run: pnpm sdk:build

      - name: Test plugin SDK
        run: pnpm sdk:test

      - name: Verify official Webhook plugin resource
        run: pnpm plugin:official-webhook:verify

      - name: Run tests
        run: pnpm test

      - name: Run type checks
        run: pnpm typecheck

      - name: Build application
        run: pnpm build

      - name: Run Electron UI regression
        run: pnpm test:ui:run

      - name: Upload Electron UI failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: electron-ui-regression
          path: output/playwright
          if-no-files-found: ignore
