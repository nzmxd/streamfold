name: Package and release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Verify release source
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.24.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.21.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin SDK
        run: pnpm sdk:build

      - name: Test plugin SDK
        run: pnpm sdk:test

      - name: Verify official Webhook plugin resource
        run: pnpm plugin:official-webhook:verify

      - name: Verify version tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $packageVersion = node -p "require('./package.json').version"
          if ($packageVersion -notmatch '^\d+\.\d+\.\d+$') {
            throw "Only stable SemVer package versions can be published to the latest channel: $packageVersion"
          }
          if ($env:GITHUB_REF_NAME -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Only stable SemVer tags can be published to the latest channel: $env:GITHUB_REF_NAME"
          }
          if ($env:GITHUB_REF_NAME -ne "v$packageVersion") {
            throw "Tag $env:GITHUB_REF_NAME does not match package version v$packageVersion"
          }

      - name: Verify public release repository
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $visibility = gh api "repos/$env:GITHUB_REPOSITORY" --jq '.visibility'
          if ($visibility -ne 'public') {
            throw "Tagged releases require a public repository so installed applications can access update metadata without a GitHub token"
          }

      - name: Run tests and type checks
        run: pnpm test && pnpm typecheck

  package:
    name: Package ${{ matrix.label }}
    needs: quality
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            os: windows-latest
            builder_args: --win
            auto_update_enabled: true
            update_manifest: latest.yml
            requires_external_blockmap: true
            artifact_name: streamfold-windows
            artifact_path: |
              release/*.exe
              release/*.zip
              release/latest.yml
              release/*.blockmap
          - label: macOS
            os: macos-latest
            builder_args: --mac
            auto_update_enabled: false
            artifact_name: streamfold-macos
            artifact_path: |
              release/*.dmg
              release/*.zip
          - label: Linux
            os: ubuntu-latest
            builder_args: --linux
            auto_update_enabled: true
            update_manifest: latest-linux.yml
            requires_external_blockmap: false
            artifact_name: streamfold-linux
            artifact_path: |
              release/*.AppImage
              release/*.tar.gz
              release/latest-linux.yml
              release/*.blockmap

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      STREAMFOLD_AUTO_UPDATE_ENABLED: ${{ matrix.auto_update_enabled }}
      STREAMFOLD_PLUGIN_CATALOG_ROOT_KEY: ${{ vars.STREAMFOLD_PLUGIN_CATALOG_ROOT_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.24.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.21.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure optional plugin catalog
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:STREAMFOLD_PLUGIN_CATALOG_ROOT_KEY)) {
            "STREAMFOLD_PLUGIN_CATALOG_URL=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "STREAMFOLD_PLUGIN_CATALOG_ROOT_KEY=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "Plugin catalog discovery is disabled because STREAMFOLD_PLUGIN_CATALOG_ROOT_KEY is not configured."
          } else {
            "STREAMFOLD_PLUGIN_CATALOG_URL=https://${{ github.repository_owner }}.github.io/streamfold-plugins/catalog.json" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "Plugin catalog discovery is enabled for the signed repository catalog."
          }

      - name: Build application
        run: pnpm build

      - name: Package application with update metadata
        if: matrix.auto_update_enabled == true
        run: pnpm exec electron-builder ${{ matrix.builder_args }} --publish never --config.publish.provider=github --config.publish.owner="${{ github.repository_owner }}" --config.publish.repo="${{ github.event.repository.name }}"

      - name: Package application without update metadata
        if: matrix.auto_update_enabled != true
        run: pnpm exec electron-builder ${{ matrix.builder_args }} --publish never

      - name: Verify packaged plugin runtime
        run: pnpm test:package-plugins -- release

      - name: Run packaged QuickJS smoke
        run: pnpm test:package-runtime -- release

      - name: Verify update artifacts
        if: matrix.auto_update_enabled == true
        env:
          RELEASE_DIR: release
          UPDATE_MANIFEST: ${{ matrix.update_manifest }}
          UPDATE_PROVIDER_OWNER: ${{ github.repository_owner }}
          UPDATE_PROVIDER_REPO: ${{ github.event.repository.name }}
          REQUIRE_EXTERNAL_BLOCKMAP: ${{ matrix.requires_external_blockmap }}
        run: pnpm test:update-artifacts

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Create SHA-256 checksums
        working-directory: release-assets
        run: find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Remove an existing draft or refuse a published release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if existing_draft="$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft' 2>/dev/null)"; then
            if [ "$existing_draft" = "true" ]; then
              echo "Removing existing draft release $GITHUB_REF_NAME before rebuilding it."
              gh release delete "$GITHUB_REF_NAME" --yes --repo "$GITHUB_REPOSITORY"
            else
              echo "Release $GITHUB_REF_NAME is already published; published releases are immutable." >&2
              exit 1
            fi
          fi

      - name: Create draft GitHub release with all assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release-assets/* --draft --verify-tag --generate-notes --title "Streamfold $GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --latest --repo "$GITHUB_REPOSITORY"
