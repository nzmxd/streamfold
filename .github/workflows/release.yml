name: Package and release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Verify release source
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify version tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $packageVersion = node -p "require('./package.json').version"
          if ($env:GITHUB_REF_NAME -ne "v$packageVersion") {
            throw "Tag $env:GITHUB_REF_NAME does not match package version v$packageVersion"
          }

      - name: Run tests and type checks
        run: pnpm test && pnpm typecheck

  package:
    name: Package ${{ matrix.label }}
    needs: quality
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            os: windows-latest
            command: dist:win
            artifact_name: streamfold-windows
            artifact_path: |
              release/*.exe
              release/*.zip
          - label: macOS
            os: macos-latest
            command: dist:mac
            artifact_name: streamfold-macos
            artifact_path: |
              release/*.dmg
              release/*.zip
          - label: Linux
            os: ubuntu-latest
            command: dist:linux
            artifact_name: streamfold-linux
            artifact_path: |
              release/*.AppImage
              release/*.tar.gz

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package application
        run: pnpm ${{ matrix.command }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create SHA-256 checksums
        working-directory: release-assets
        run: find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* --verify-tag --generate-notes --title "Streamfold $GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY"
          fi
