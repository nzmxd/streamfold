name: Validate plugin catalog

on:
  pull_request:
    paths:
      - catalog.source.json
      - schema/**
      - scripts/**
      - .github/workflows/catalog-*.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
      - name: Validate source index
        run: node scripts/catalog.mjs validate-source catalog.source.json
      - name: Parse published JSON Schema
        run: node -e "JSON.parse(require('node:fs').readFileSync('schema/catalog-v1.schema.json', 'utf8'))"
